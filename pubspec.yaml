name: voicenote_ai
description: Privacy-first meeting recorder MVP for local-first meeting capture, transcript editing, and export.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.6
  flutter_secure_storage: ^10.0.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  record: ^6.2.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
